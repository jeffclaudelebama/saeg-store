<!-- wp:html -->
<header class="sticky top-0 z-50 bg-white border-b border-slate-100 px-4 md:px-10 py-3">
  <div class="max-w-7xl mx-auto flex items-center justify-between gap-4">
    <!-- Logo and Navigation -->
    <div class="flex items-center gap-8">
      <!-- Logo -->
      <a class="flex items-center gap-3" href="/">
        <img 
          alt="Logo AGROPAG" 
          class="h-10 w-auto" 
          src="https://admin.store.saeggabon.ga/wp-content/uploads/2026/03/499871381_122101467926886115_2230277052560218685_n-removebg-preview.png"
          loading="lazy"
        />
        <span class="text-lg font-black text-[#0B2B16] hidden md:inline">AGROPAG</span>
      </a>

      <!-- Navigation Menu -->
      <nav class="hidden md:flex items-center gap-8">
        <a class="text-slate-900 text-sm font-semibold hover:text-primary transition-colors" href="/boutique/">
          Boutique
        </a>
        <a class="text-slate-900 text-sm font-semibold hover:text-primary transition-colors" href="#categories">
          Catégories
        </a>
        <a class="text-slate-900 text-sm font-semibold hover:text-primary transition-colors" href="/contact/">
          Contact
        </a>
      </nav>
    </div>

    <!-- Right Side: Search, Cart, Profile -->
    <div class="flex flex-1 justify-end items-center gap-4">
      <!-- Search Bar (Desktop) -->
      <div class="hidden lg:flex relative w-full max-w-xs">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
        <input 
          class="w-full pl-10 pr-4 py-2 bg-slate-50 border-none rounded text-sm focus:ring-1 focus:ring-primary" 
          placeholder="Rechercher un produit..." 
          type="text"
          id="header-search"
        />
      </div>

      <!-- Cart Button -->
      <a class="relative p-2 text-slate-700 hover:bg-slate-50 rounded" href="/panier/">
        <span class="material-symbols-outlined">shopping_cart</span>
        <span class="absolute top-0 right-0 bg-primary text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full" id="cart-count">0</span>
      </a>

      <!-- Profile Avatar -->
      <div class="h-8 w-8 rounded-full bg-slate-200 overflow-hidden">
        <img 
          class="w-full h-full object-cover" 
          src="/wp-content/themes/saeg-la-boutique/assets/images/user-avatar.jpg"
          alt="User profile"
        />
      </div>
    </div>
  </div>
</header>
<!-- /wp:html -->
