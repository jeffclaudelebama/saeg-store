server {
  listen 80;
  server_name admin.agropag.ga;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name admin.agropag.ga;

  ssl_certificate     /etc/letsencrypt/live/admin.agropag.ga/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/admin.agropag.ga/privkey.pem;

  root /var/www/admin.agropag.ga/public;
  index index.php index.html;

  client_max_body_size 20m;

  location / {
    try_files $uri $uri/ /index.php?$args;
  }

  location ~ \.php$ {
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_pass unix:/run/php/php8.2-fpm.sock;
  }

  # Headless: éviter le cache des APIs Woo/WP
  location ~* ^/wp-json/ {
    add_header Cache-Control "no-store" always;
  }
}
