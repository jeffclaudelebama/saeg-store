<!-- wp:template {"slug":"archive","templateName":"Archive"} -->

<!-- wp:template-part {"slug":"header"} /-->

<!-- wp:group {"align":"full","layout":{"type":"constrained"},"className":"archive-wrapper"} -->
<main class="wp-block-group alignfull archive-wrapper">
    
    <!-- Archive Header -->
    <!-- wp:group {"align":"full","backgroundColor":"primary","layout":{"inherit":true},"className":"archive-header"} -->
    <header class="wp-block-group alignfull archive-header">
        <!-- wp:heading {"level":1,"fontSize":"4xl"} -->
        <h1 class="wp-block-heading" style="color: #ffffff; font-size: 2.5rem; margin: 0;">
            <?php the_archive_title(); ?>
        </h1>
        <!-- /wp:heading -->
        
        <!-- wp:html -->
        <?php the_archive_description( '<p style="color: rgba(255, 255, 255, 0.9); margin-top: 1rem;">', '</p>' ); ?>
        <!-- /wp:html -->
    </header>
    <!-- /wp:group -->
    
    <!-- Posts Grid -->
    <!-- wp:html -->
    <div class="archive-posts" style="padding: var(--spacing-3xl) var(--spacing-xl); display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: var(--spacing-2xl);">
        <?php
        if ( have_posts() ) {
            while ( have_posts() ) {
                the_post();
                ?>
                <article class="post-card-grid">
                    <?php if ( has_post_thumbnail() ) { ?>
                        <div class="post-image">
                            <a href="<?php the_permalink(); ?>">
                                <?php
                                the_post_thumbnail( 'saeg-featured', array(
                                    'alt' => get_the_title(),
                                ) );
                                ?>
                            </a>
                        </div>
                    <?php } ?>
                    
                    <div class="post-card-content">
                        <h3 class="post-card-title">
                            <a href="<?php the_permalink(); ?>">
                                <?php the_title(); ?>
                            </a>
                        </h3>
                        
                        <div class="post-card-meta">
                            <time datetime="<?php echo esc_attr( get_the_date( 'c' ) ); ?>">
                                <?php echo esc_html( get_the_date() ); ?>
                            </time>
                        </div>
                        
                        <p class="post-card-excerpt">
                            <?php
                            if ( has_excerpt() ) {
                                the_excerpt();
                            } else {
                                echo wp_trim_words( get_the_content(), 20 );
                            }
                            ?>
                        </p>
                        
                        <a href="<?php the_permalink(); ?>" class="read-more">
                            <?php _e( 'Read More →', 'saeg-la-boutique' ); ?>
                        </a>
                    </div>
                </article>
                <?php
            }
            
            // Pagination
            the_posts_pagination( array(
                'mid_size' => 2,
                'prev_text' => __( '← Previous', 'saeg-la-boutique' ),
                'next_text' => __( 'Next →', 'saeg-la-boutique' ),
            ) );
        } else {
            echo '<p style="grid-column: 1/-1; text-align: center;">' . __( 'No posts found in this archive.', 'saeg-la-boutique' ) . '</p>';
        }
        ?>
    </div>
    <!-- /wp:html -->
    
</main>
